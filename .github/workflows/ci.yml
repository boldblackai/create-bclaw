name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      # mise is the single source of truth for tool versions (mise.toml). This
      # installs the JS/TS toolchain CI runs — oxlint (linter), oxfmt
      # (formatter), and actionlint — straight from the release assets declared
      # there, so CI and local diverge only by mise. oxlint/oxfmt ship in the
      # oxc-project/oxc github release; actionlint from rhysd/actionlint. The
      # action defaults to ${{ github.token }} for github-backend downloads
      # (avoids the 60 req/h anonymous rate limit). The actionlint version MUST
      # still match mise.toml (v1.7.12).
      - name: Setup mise (oxlint, oxfmt, actionlint)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: actionlint
        run: actionlint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Golden test
        run: pnpm test
