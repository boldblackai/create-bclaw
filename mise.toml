[tools]
uv = "0.11.7"
node = "22.23.1"
"github:rhysd/actionlint" = "v1.7.12"

# Oxlint (linter) + oxfmt (formatter) — replace Biome. Both ship as
# per-platform archives inside a single oxc-project/oxc release whose tag is
# `apps_v<N>` (apps_v1.74.0 bundles oxlint + oxfmt). A distinct `[tool_alias]`
# per binary is REQUIRED, not just tidy: `matching`/`rename_exe` are not part of
# the install key, so two entries pointing at the same github backend without
# distinct aliases would resolve to the same dir and the second install would
# overwrite the first.
#
# We use per-platform `asset_pattern` (a literal per rust-triple archive name)
# rather than `matching`/`matching_regex`, which select the wrong asset in the
# mise rev currently installed (2026.4.23: matching is silently dropped and
# autodetection picks oxfmt for both). `asset_pattern` replaces autodetection
# entirely (a glob would pick the alphabetically-first archive, i.e. darwin),
# so each platform we target must be listed explicitly. `rename_exe` strips the
# target-triple suffix (oxlint-x86_64-unknown-linux-gnu -> oxlint). Run locally
# via `oxlint`/`oxfmt` (pnpm lint/format); in CI via jdx/mise-action, which
# `mise install`s straight from this file.
[tool_alias]
oxlint = "github:oxc-project/oxc"
oxfmt = "github:oxc-project/oxc"

[tools.oxlint]
version = "apps_v1.74.0"
rename_exe = "oxlint"

[tools.oxlint.platforms]
linux-x64 = { asset_pattern = "oxlint-x86_64-unknown-linux-gnu.tar.gz" }
linux-arm64 = { asset_pattern = "oxlint-aarch64-unknown-linux-gnu.tar.gz" }
macos-x64 = { asset_pattern = "oxlint-x86_64-apple-darwin.tar.gz" }
macos-arm64 = { asset_pattern = "oxlint-aarch64-apple-darwin.tar.gz" }

[tools.oxfmt]
version = "apps_v1.74.0"
rename_exe = "oxfmt"

[tools.oxfmt.platforms]
linux-x64 = { asset_pattern = "oxfmt-x86_64-unknown-linux-gnu.tar.gz" }
linux-arm64 = { asset_pattern = "oxfmt-aarch64-unknown-linux-gnu.tar.gz" }
macos-x64 = { asset_pattern = "oxfmt-x86_64-apple-darwin.tar.gz" }
macos-arm64 = { asset_pattern = "oxfmt-aarch64-apple-darwin.tar.gz" }
